<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FuelTech — Entrega</title>
<script src="https://unpkg.com/lucide@0.525.0/dist/umd/lucide.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f5f5f5; color: #111; font-family: 'Segoe UI', Arial, sans-serif;
         min-height: 100vh; display: flex; flex-direction: column; }
  header { background: #059669; padding: 14px 24px; display: flex; align-items: center; gap: 12px; color: #fff; }
  header .logo { height: 30px; width: auto; object-fit: contain; mix-blend-mode: multiply; }
  header .divider { width: 1px; height: 28px; background: rgba(255,255,255,0.3); }
  header h1 { font-size: 20px; font-weight: 900; display: flex; align-items: center; gap: 8px; }
  header .sub { opacity: 0.85; font-size: 13px; }

  .scanner-area {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    flex: 1; gap: 16px; padding: 32px;
  }
  .scanner-icon { color: #ccc; }
  .scanner-msg { font-size: 22px; color: #999; }
  .scanner-hint { font-size: 14px; color: #bbb; }

  /* Confirmação de entrega */
  .entrega-card {
    background: #fff; border: 2px solid #10b981; border-radius: 16px;
    padding: 24px 32px; text-align: center; max-width: 420px; width: 100%;
    display: none; box-shadow: 0 4px 16px rgba(16,185,129,0.15);
  }
  .entrega-senha { font-size: 64px; font-weight: 900; color: #10b981; letter-spacing: 4px; }
  .entrega-msg { font-size: 18px; color: #059669; margin-top: 8px;
                 display: flex; align-items: center; justify-content: center; gap: 6px; }
  .entrega-itens { text-align: left; margin-top: 16px; font-size: 13px; color: #6b7280; }
  .entrega-itens li { padding: 3px 0; border-bottom: 1px solid #e0e0e0; }

  /* Histórico */
  .historico { padding: 16px 24px; border-top: 1px solid #e0e0e0; background: #fff; }
  .historico h3 { font-size: 13px; color: #aaa; margin-bottom: 10px; text-transform: uppercase;
                  letter-spacing: 1px; }
  .hist-lista { display: flex; flex-wrap: wrap; gap: 8px; }
  .hist-chip { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 6px;
               padding: 4px 12px; font-size: 13px; color: #059669; }

  #scanner-input { position: fixed; opacity: 0; width: 1px; height: 1px; top: -100px; left: -100px; }

  /* Senhas aguardando retirada */
  .aguardando { padding: 16px 24px; border-top: 1px solid #e0e0e0; background: #fff; }
  .aguardando h3 { font-size: 13px; color: #059669; margin-bottom: 12px;
                   text-transform: uppercase; letter-spacing: 1px;
                   display: flex; align-items: center; gap: 6px; }
  .aguardando-lista { display: flex; flex-wrap: wrap; gap: 10px; }
  .aguardando-vazio { color: #bbb; font-size: 14px; padding: 4px 0; }

  .senha-card {
    background: #f0fdf4; border: 2px solid #6ee7b7; border-radius: 10px;
    padding: 10px 16px; display: flex; align-items: center; gap: 12px;
    min-width: 160px;
  }
  .senha-card .sc-num { font-size: 28px; font-weight: 900; color: #059669; letter-spacing: 2px; }
  .btn-rechamar {
    background: #dcfce7; color: #065f46; border: 1px solid #6ee7b7;
    border-radius: 6px; padding: 5px 10px; font-size: 12px; font-weight: 700;
    cursor: pointer; white-space: nowrap; transition: background 0.15s;
    display: flex; align-items: center; gap: 4px;
  }
  .btn-rechamar:hover { background: #10b981; color: #fff; }
  .btn-rechamar:active { transform: scale(0.96); }
  .btn-rechamar.ok { background: #10b981; color: #fff; }

  .lucide { display: inline-block; vertical-align: middle; }
</style>
</head>
<body>
<header>
  <img src="/logo_fueltech.png" alt="FuelTech" class="logo" onerror="this.style.display='none'" />
  <div class="divider"></div>
  <h1><i data-lucide="check-circle-2" style="width:22px;height:22px"></i> ENTREGA</h1>
  <div class="sub">Confirmação de Entrega</div>
</header>

<input id="scanner-input" autocomplete="off" />

<div class="scanner-area">
  <div class="scanner-icon"><i data-lucide="scan-line" style="width:80px;height:80px"></i></div>
  <div class="scanner-msg">Aguardando leitura do QR Code</div>
  <div class="scanner-hint">Escaneie o QR2 da sacola do cliente para confirmar a entrega</div>

  <div class="entrega-card" id="entrega-card">
    <div class="entrega-senha" id="entrega-senha">--</div>
    <div class="entrega-msg">
      <i data-lucide="check-circle-2" style="width:20px;height:20px"></i> Entrega confirmada!
    </div>
    <ul class="entrega-itens" id="entrega-itens"></ul>
  </div>
</div>

<div class="aguardando">
  <h3><i data-lucide="clock" style="width:15px;height:15px"></i> Aguardando retirada</h3>
  <div class="aguardando-lista" id="aguardando-lista">
    <div class="aguardando-vazio">Nenhuma senha chamada</div>
  </div>
</div>

<div class="historico">
  <h3>Entregues hoje</h3>
  <div class="hist-lista" id="hist-lista"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  lucide.createIcons()
  const socket = io()

  // Identifica este painel como sala 'entrega'
  socket.emit('join-room', 'entrega')

  // Recebe etiqueta QR2 e delega ao agente local
  socket.on('fila:imprimir', async ({ tipo, dados }) => {
    if (tipo !== 'etiqueta') return
    try {
      const resp = await fetch('http://localhost:4002/print/etiqueta', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(dados),
      })
      if (!resp.ok) console.warn('[print] ft-fila-agent retornou', resp.status)
    } catch (e) {
      console.warn('[print] ft-fila-agent offline:', e.message)
    }
  })

  const historico = []

  // ── Scanner USB HID ───────────────────────────────────────────────────────
  const scannerInput = document.getElementById('scanner-input')
  document.addEventListener('click', () => scannerInput.focus())
  scannerInput.focus()

  let buffer = ''
  let bufTimer = null

  scannerInput.addEventListener('input', () => {
    buffer += scannerInput.value
    scannerInput.value = ''
    clearTimeout(bufTimer)
    bufTimer = setTimeout(async () => {
      const qrCode = buffer.trim()
      buffer = ''
      if (!qrCode) return

      try {
        const res  = await fetch('/api/fila/scan', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ qrCode }),
        })
        const data = await res.json()

        if (res.ok && data.status === 'ENTREGUE') {
          mostrarConfirmacao(data)
          adicionarHistorico(data.senha)
        } else {
          document.querySelector('.scanner-msg').textContent = data.error || 'QR não reconhecido'
          setTimeout(() => { document.querySelector('.scanner-msg').textContent = 'Aguardando leitura do QR Code' }, 2000)
        }
      } catch (e) {
        console.error('[scanner] Erro ao processar QR:', e)
        document.querySelector('.scanner-msg').textContent = 'Erro de conexão com servidor'
        setTimeout(() => { document.querySelector('.scanner-msg').textContent = 'Aguardando leitura do QR Code' }, 2000)
      }
    }, 100)
  })

  function mostrarConfirmacao(data) {
    const card = document.getElementById('entrega-card')
    document.getElementById('entrega-senha').textContent = data.senha
    card.style.display = 'block'
    document.querySelector('.scanner-icon').style.display = 'none'
    document.querySelector('.scanner-msg').textContent = ''
    lucide.createIcons()
    setTimeout(() => {
      card.style.display = 'none'
      document.querySelector('.scanner-icon').style.display = 'block'
      document.querySelector('.scanner-msg').textContent = 'Aguardando leitura do QR Code'
    }, 4000)
  }

  function adicionarHistorico(senha) {
    historico.unshift(senha)
    const lista = document.getElementById('hist-lista')
    lista.innerHTML = historico.slice(0, 20).map(s =>
      `<div class="hist-chip">&#10003; ${s}</div>`
    ).join('')
  }

  socket.on('connect', () => console.log('[ws] conectado'))

  // ── Lista de senhas aguardando retirada (status CHAMADO) ──────────────────
  async function carregarAguardando() {
    const res    = await fetch('/api/fila/tv')
    const ordens = await res.json()
    const chamadas = ordens.filter(o => o.status === 'CHAMADO')
    renderAguardando(chamadas)
  }

  function renderAguardando(ordens) {
    const lista = document.getElementById('aguardando-lista')
    if (!ordens.length) {
      lista.innerHTML = '<div class="aguardando-vazio">Nenhuma senha chamada</div>'
      return
    }
    lista.innerHTML = ordens.map(o => `
      <div class="senha-card" id="sc-${o.id}">
        <span class="sc-num">${o.senha}</span>
        <button class="btn-rechamar" onclick="rechamar(${o.id}, this)">
          <i data-lucide="volume-2" style="width:13px;height:13px"></i> Rechamar
        </button>
      </div>
    `).join('')
    lucide.createIcons()
  }

  async function rechamar(id, btn) {
    btn.disabled = true
    btn.innerHTML = '...'
    try {
      await fetch(`/api/fila/${id}/rechamar`, { method: 'POST' })
      btn.innerHTML = '<i data-lucide="check" style="width:13px;height:13px"></i> Chamado!'
      btn.classList.add('ok')
      lucide.createIcons()
      setTimeout(() => {
        btn.innerHTML = '<i data-lucide="volume-2" style="width:13px;height:13px"></i> Rechamar'
        btn.disabled = false
        btn.classList.remove('ok')
        lucide.createIcons()
      }, 3000)
    } catch (e) {
      btn.textContent = 'Erro'
      setTimeout(() => { btn.textContent = 'Rechamar'; btn.disabled = false }, 2000)
    }
  }

  carregarAguardando()
  socket.on('fila:atualizada', carregarAguardando)
  socket.on('fila:nova',       carregarAguardando)
  socket.on('fila:entregue',   carregarAguardando)
</script>
</body>
</html>
