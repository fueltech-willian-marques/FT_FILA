<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FuelTech — Painel de Senhas</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0a; color: #fff; font-family: 'Segoe UI', Arial, sans-serif;
         height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  header { background: #e52e2e; padding: 16px 32px; display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 28px; font-weight: 900; letter-spacing: 2px; }
  header .hora { margin-left: auto; font-size: 22px; font-weight: 700; opacity: 0.9; }

  .cols { display: flex; flex: 1; overflow: hidden; }

  .col { flex: 1; display: flex; flex-direction: column; border-right: 1px solid #1a1a1a; }
  .col:last-child { border-right: none; }

  .col-header { padding: 14px 24px; font-size: 16px; font-weight: 700; letter-spacing: 1.5px;
                text-transform: uppercase; }
  .col-header.separando { background: #1a1200; color: #f59e0b; border-bottom: 2px solid #f59e0b; }
  .col-header.chamado   { background: #001a0d; color: #10b981; border-bottom: 2px solid #10b981; }

  .senhas { flex: 1; overflow: hidden; display: flex; flex-wrap: wrap; align-content: flex-start;
            gap: 12px; padding: 20px 24px; }

  .senha-chip {
    display: flex; align-items: center; justify-content: center;
    font-size: 52px; font-weight: 900; letter-spacing: 3px;
    width: calc(50% - 6px); height: 110px;
    border-radius: 12px;
    animation: fadeIn 0.4s ease;
  }
  .senha-chip.separando { background: #1a1200; color: #f59e0b; border: 2px solid #f59e0b44; }
  .senha-chip.chamado   { background: #001a0d; color: #10b981; border: 2px solid #10b98144; }

  @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

  .vazio { color: #333; font-size: 18px; padding: 32px 24px; }
</style>
</head>
<body>
<header>
  <h1>FUELTECH</h1>
  <div>PAINEL DE SENHAS</div>
  <div class="hora" id="hora">--:--</div>
</header>
<div class="cols">
  <div class="col">
    <div class="col-header separando">⏳ Em Separação</div>
    <div class="senhas" id="col-separando"><div class="vazio">Nenhuma ordem</div></div>
  </div>
  <div class="col">
    <div class="col-header chamado">✅ Chamadas</div>
    <div class="senhas" id="col-chamado"><div class="vazio">Nenhuma ordem</div></div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io()

  function renderSenha(senha, tipo) {
    const el = document.createElement('div')
    el.className = `senha-chip ${tipo}`
    el.textContent = senha
    el.dataset.senha = senha
    return el
  }

  function render(ordens) {
    const sep = document.getElementById('col-separando')
    const cha = document.getElementById('col-chamado')
    sep.innerHTML = ''
    cha.innerHTML = ''
    const separando = ordens.filter(o => o.status === 'SEPARANDO')
    const chamado   = ordens.filter(o => o.status === 'CHAMADO')
    if (!separando.length) sep.innerHTML = '<div class="vazio">Nenhuma ordem</div>'
    else separando.forEach(o => sep.appendChild(renderSenha(o.senha, 'separando')))
    if (!chamado.length) cha.innerHTML = '<div class="vazio">Nenhuma senha chamada</div>'
    else chamado.forEach(o => cha.appendChild(renderSenha(o.senha, 'chamado')))
  }

  // Carrega estado inicial
  fetch('/api/fila/tv').then(r => r.json()).then(render)

  // Atualizações em tempo real
  socket.on('fila:nova',       () => fetch('/api/fila/tv').then(r => r.json()).then(render))
  socket.on('fila:atualizada', () => fetch('/api/fila/tv').then(r => r.json()).then(render))
  socket.on('fila:entregue',   () => fetch('/api/fila/tv').then(r => r.json()).then(render))

  // Relógio
  function tick() { document.getElementById('hora').textContent = new Date().toTimeString().slice(0,5) }
  tick(); setInterval(tick, 30000)
</script>
</body>
</html>
